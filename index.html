<style>

  --green-bg: #EAF3DE;

  --amber-bg: #FAEEDA;
  --amber-border: #FAC775;
  --red-dark: #993C1D;

  --blue-dark: #185FA5;
  --blue-bg: #E6F1FB;
  --gray-bg: #F1EFE8;
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f8f7f4;
  --border: rgba(0,0,0,0.1);

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1c18;

    --surface2: #2c3027;
    --border: rgba(255,255,255,0.1);

}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:520px;margin:0 auto;display:flex;flex-direction:column}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.header-left h1{font-size:16px;font-weight:600;color:var(--text)}
.header-left p{font-size:11px;color:var(--text3);margin-top:1px}
.sync-btn{display:flex;align-items:center;gap:5px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:500;color:var(--green-dark);cursor:pointer;white-space:nowrap}
.sync-btn svg{width:13px;height:13px;flex-shrink:0}
.sync-btn.syncing svg{animation:spin 1s linear infinite}
.sync-btn.error{background:var(--red-bg);border-color:#f0997b;color:var(--red-dark)}

.content{flex:1;padding:12px;overflow-y:auto;padding-bottom:80px}
.nav{display:flex;border-top:1px solid var(--border);background:var(--surface);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:20}
.nav-btn{flex:1;padding:8px 4px 10px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text3);font-size:10px;font-family:inherit}
.nav-btn.active{color:var(--green-mid)}
.nav-btn svg{width:20px;height:20px}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px}

.metric.green .metric-value{color:var(--green-mid)}

.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}

.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block}
.badge-labor{background:var(--green-bg);color:var(--green-dark)}

.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;margin-top:10px}

.setup-box ol{font-size:12px;color:var(--amber-dark);line-height:1.7;padding-left:16px}

.setup-input-row input{flex:1;font-size:13px}

.conflict-box{background:var(--blue-bg);border:1px solid #85B7EB;border-radius:var(--radius);padding:14px;margin-bottom:10px}
.conflict-box h3{font-size:13px;font-weight:600;color:var(--blue-dark);margin-bottom:6px}
.conflict-box p{font-size:12px;color:var(--blue-dark);line-height:1.5;margin-bottom:8px}
.btn-conflict{padding:8px 14px;font-size:12px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;border:1px solid #85B7EB}
.btn-take-cloud{background:var(--blue-bg);color:var(--blue-dark)}
.btn-take-local{background:var(--surface);color:var(--text)}
.btn-merge{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.sync-log{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic}
</style>

<body>

<div class="header">
  <div class="header-left">
    <h1>Thopramkudy Farm</h1>

  <button class="sync-btn" id="sync-btn" onclick="triggerSync()">

<div id="modal-root"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const DB_KEY = 'cf_data_v2';
const CFG_KEY = 'cf_config_v2';

let cfg = {
  driveFileId: null,
  passphrase: null,
  lastSyncTs: null,
  deviceId: 'dev_' + Math.random().toString(36).slice(2,8)
};

let db = {
  sections: [
    {id:'s1', name:'Upper Block A', plants:120, age:3, notes:'Near stream', createdAt:Date.now()},
    {id:'s2', name:'Lower Block B', plants:85, age:5, notes:'Good shade', createdAt:Date.now()},
    {id:'s3', name:'Hillside C', plants:95, age:2, notes:'New plantation', createdAt:Date.now()},
  ],
  yields: [
    {id:'y1', sectionId:'s1', date:'2024-10', qty:42, season:'Kharif', createdAt:Date.now()},
    {id:'y2', sectionId:'s2', date:'2024-10', qty:38, season:'Kharif', createdAt:Date.now()},
    {id:'y3', sectionId:'s3', date:'2024-10', qty:18, season:'Kharif', createdAt:Date.now()},
    {id:'y4', sectionId:'s1', date:'2025-01', qty:15, season:'Rabi', createdAt:Date.now()},
    {id:'y5', sectionId:'s2', date:'2025-01', qty:12, season:'Rabi', createdAt:Date.now()},
  ],
  expenses: [
    {id:'e1', date:'2025-02-10', category:'labor', desc:'Harvesting labor', amount:8500, sectionId:null, createdAt:Date.now()},
    {id:'e2', date:'2025-02-05', category:'pesticide', desc:'Fungicide spray', amount:2200, sectionId:'s1', createdAt:Date.now()},
    {id:'e3', date:'2025-01-20', category:'rawmat', desc:'Fertilizer NPK', amount:4800, sectionId:null, createdAt:Date.now()},
    {id:'e4', date:'2025-01-15', category:'crop', desc:'Seedlings', amount:3500, sectionId:'s3', createdAt:Date.now()},
    {id:'e5', date:'2024-12-01', category:'labor', desc:'Weeding', amount:5000, sectionId:null, createdAt:Date.now()},
  ],
  incomes: [
    {id:'i1', date:'2025-02-12', qty:98, pricePerKg:4200, buyer:'Local trader', notes:'Kharif harvest', sectionId:null, createdAt:Date.now()},
    {id:'i2', date:'2025-01-20', qty:27, pricePerKg:4050, buyer:'Vandanmedu auction', notes:'Rabi', sectionId:null, createdAt:Date.now()},
  ],
  marketPrice: 2450,
  marketPriceDate: null,
  updatedAt: Date.now()
};

let appState = { tab: 'dashboard', expTab: 'all', syncing: false, conflict: null, oauthToken: null };

// ─── PERSIST ────────────────────────────────────────────────────────────────
function saveLocal() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch(e){}
  db.updatedAt = Date.now();
}
function loadLocal() {
  try {
    const d = localStorage.getItem(DB_KEY);
    if (d) db = { ...db, ...JSON.parse(d) };
    const c = localStorage.getItem(CFG_KEY);
    if (c) cfg = { ...cfg, ...JSON.parse(c) };
  } catch(e){}
}
function saveCfg() {
  try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch(e){}
}
loadLocal();

// ─── CRYPTO ──────────────────────────────────────────────────────────────────
async function getKey(passphrase, salt) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
    keyMat, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encrypt(data, passphrase) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await getKey(passphrase, salt);
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const buf = new Uint8Array(salt.length + iv.length + ct.byteLength);
  buf.set(salt); buf.set(iv, 16); buf.set(new Uint8Array(ct), 28);
  return btoa(String.fromCharCode(...buf));
}
async function decrypt(b64, passphrase) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = raw.slice(0,16), iv = raw.slice(16,28), ct = raw.slice(28);
  const key = await getKey(passphrase, salt);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

// ─── GOOGLE DRIVE SYNC ───────────────────────────────────────────────────────
const DRIVE_FILENAME = 'cardamom_farm_data.enc';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

// NOTE: Replace with your own Google OAuth Client ID
// Get free at console.cloud.google.com → Create Project → APIs → Drive API → Credentials → OAuth Client ID (Web app)
// Add authorised JS origins: http://localhost and the URL where you host this file
const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID_HERE'; // fallback only — runtime value read from cfg

function getClientId() {
  return cfg.clientId || CLIENT_ID;
}

async function getOAuthToken() {
  if (appState.oauthToken) return appState.oauthToken;
  return new Promise((resolve, reject) => {
    if (typeof google === 'undefined' || !google.accounts) {
      reject(new Error('Google API not loaded. Check internet connection.'));
      return;
    }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: getClientId(),
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) reject(new Error(resp.error));
        else { appState.oauthToken = resp.access_token; resolve(resp.access_token); }
      }
    });
    client.requestAccessToken();
  });
}

async function findDriveFile(token) {
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${DRIVE_FILENAME}'&fields=files(id,modifiedTime)`,
    { headers: { Authorization: 'Bearer ' + token } }
  );
  const d = await r.json();
  return d.files?.[0] || null;
}

async function readDriveFile(token, fileId) {
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: 'Bearer ' + token } }
  );
  return r.text();
}

async function writeDriveFile(token, fileId, content) {
  const meta = { name: DRIVE_FILENAME, parents: fileId ? undefined : ['appDataFolder'] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
  form.append('file', new Blob([content], {type:'text/plain'}));
  const url = fileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const r = await fetch(url, {
    method: fileId ? 'PATCH' : 'POST',
    headers: { Authorization: 'Bearer ' + token },
    body: form
  });
  return r.json();
}

async function triggerSync() {
  if (appState.syncing) return;
  if (!cfg.passphrase) { showPassphraseSetup(); return; }
  if (!getClientId() || getClientId() === 'YOUR_GOOGLE_CLIENT_ID_HERE') { showClientIdSetup(); return; }

  appState.syncing = true;
  setSyncUI('syncing', 'Syncing...');

  try {
    const token = await getOAuthToken();
    const file = await findDriveFile(token);

    if (!file) {
      // First sync — upload local data
      const enc = await encrypt(db, cfg.passphrase);
      const result = await writeDriveFile(token, null, enc);
      cfg.driveFileId = result.id;
      cfg.lastSyncTs = Date.now();
      saveCfg(); saveLocal();
      setSyncUI('ok', 'Synced ✓');
    } else {
      // File exists — read, merge, write
      cfg.driveFileId = file.id;
      const raw = await readDriveFile(token, file.id);
      let cloudDb;
      try { cloudDb = await decrypt(raw, cfg.passphrase); }
      catch(e) { setSyncUI('error', 'Wrong passphrase'); appState.syncing = false; return; }

      const merged = mergeDb(db, cloudDb);
      db = merged;
      saveLocal();

      const enc = await encrypt(db, cfg.passphrase);
      await writeDriveFile(token, file.id, enc);
      cfg.lastSyncTs = Date.now();
      saveCfg();
      setSyncUI('ok', 'Synced ✓');
      render();
    }
  } catch(e) {
    console.error(e);
    setSyncUI('error', 'Failed — retry');
  }
  appState.syncing = false;
  setTimeout(() => setSyncUI('idle', 'Sync'), 3000);
}

// ─── MERGE: last-write-wins by record updatedAt / createdAt ─────────────────
function mergeDb(local, cloud) {
  function mergeList(localList, cloudList) {
    const map = {};
    for (const item of localList) map[item.id] = item;
    for (const item of cloudList) {
      if (!map[item.id] || (item.createdAt || 0) > (map[item.id].createdAt || 0)) {
        map[item.id] = item;
      }
    }
    return Object.values(map).sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
  }
  return {
    sections: mergeList(local.sections, cloud.sections),
    yields: mergeList(local.yields, cloud.yields),
    expenses: mergeList(local.expenses, cloud.expenses),
    incomes: mergeList(local.incomes, cloud.incomes),
    marketPrice: cloud.updatedAt > local.updatedAt ? cloud.marketPrice : local.marketPrice,
    marketPriceDate: cloud.updatedAt > local.updatedAt ? cloud.marketPriceDate : local.marketPriceDate,
    updatedAt: Math.max(local.updatedAt || 0, cloud.updatedAt || 0)
  };
}

function setSyncUI(state, label) {
  const btn = document.getElementById('sync-btn');
  const lbl = document.getElementById('sync-label');
  if (!btn) return;
  btn.className = 'sync-btn' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  lbl.textContent = label;
}

const fmtCur = n => '₹' + Math.round(n).toLocaleString('en-IN');
const fmtDate = s => { if (!s) return ''; const d = new Date(s); return isNaN(d) ? s : d.toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'2-digit'}); };
const totalPlants = () => db.sections.reduce((s,x) => s + (x.plants||0), 0);
const totalYieldKg = () => db.yields.reduce((s,x) => s + (x.qty||0), 0);
const totalExpenses = () => db.expenses.reduce((s,x) => s + (x.amount||0), 0);
const totalIncome = () => db.incomes.reduce((s,x) => s + ((x.qty||0)*(x.pricePerKg||0)), 0);
const yieldForSection = id => db.yields.filter(y => y.sectionId === id).reduce((s,y) => s + (y.qty||0), 0);

function renderForecast() {
  const mp = db.marketPrice || 2450;
  const plants = totalPlants();
  const rawYpp = totalPlants()>0 ? totalYieldKg()/totalPlants() : 0.45;
  const ypp = rawYpp > 0 ? rawYpp : 0.45;
  const monthlyFixedExp = db.expenses.length > 0 ? totalExpenses() / 12 : 3000;

  const now = new Date();
  const rows = Array.from({length:8},(_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()+i+1, 1);
    const mo = d.getMonth()+1;
    const label = d.toLocaleDateString('en-IN',{month:'short',year:'numeric'});
    const isPeak = [7,8,9,10].includes(mo);
    const sf = isPeak ? 1.5 : 0.55;
    const projYield = Math.round(plants * ypp * sf / 12);
    const projIncome = projYield * mp;
    const projExp = Math.round(monthlyFixedExp * (isPeak ? 1.3 : 0.8));
    const projProfit = projIncome - projExp;
    return {label, projYield, projIncome, projExp, projProfit, isPeak};
  });

  const totForecastIncome = rows.reduce((s,r)=>s+r.projIncome,0);
  const totForecastProfit = rows.reduce((s,r)=>s+r.projProfit,0);

  return `
    <div class="card">
      <div class="card-title">Forecast basis</div>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">Plants</div><div class="metric-value">${plants}</div></div>
        <div class="metric"><div class="metric-label">Price used</div><div class="metric-value" style="font-size:15px">₹${mp}/kg</div></div>
        <div class="metric"><div class="metric-label">Yield/plant/yr</div><div class="metric-value">${ypp.toFixed(2)} kg</div><div class="metric-sub">from your data</div></div>
        <div class="metric amber"><div class="metric-label">Peak season</div><div class="metric-value" style="font-size:13px">Jul–Oct</div><div class="metric-sub">Kharif</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">8-month forecast</div>
      <div class="metric-grid" style="margin-bottom:12px">
        <div class="metric green"><div class="metric-label">Forecast income</div><div class="metric-value" style="font-size:16px">${fmtCur(totForecastIncome)}</div></div>
        <div class="metric ${totForecastProfit>=0?'green':'red'}"><div class="metric-label">Forecast profit</div><div class="metric-value" style="font-size:16px">${fmtCur(totForecastProfit)}</div></div>
      </div>
      ${rows.map(r => `
        <div class="row">
          <div>
            <div class="row-title">${r.label}${r.isPeak?'<span class="peak-badge">Peak</span>':''}</div>
            <div class="row-sub">~${r.projYield}kg · exp ${fmtCur(r.projExp)}</div>
          </div>
          <div class="row-right">
            <div class="proj-profit ${r.projProfit>=0?'pos':'neg'}">${fmtCur(r.projProfit)}</div>
            <div style="font-size:10px;color:var(--text3)">net</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Auction centers near Thopramkudy</div>
      ${[
        {name:'Vandanmedu (MAS Enterprises)',dist:'~25km',days:'Fridays'},
        {name:'Kumily auction center',dist:'~30km',days:'Daily'},
        {name:'Spices Board (official prices)',dist:'Online',days:'Daily'},
      ].map(c => `
        <div class="row">
          <div><div class="row-title">${c.name}</div><div class="row-sub">${c.dist} · ${c.days}</div></div>
        </div>`).join('')}
      <a href="https://www.indianspices.com/marketing/price/domestic/daily-price.html" target="_blank" style="display:block;margin-top:10px;font-size:12px;color:var(--green-mid);text-decoration:none">View Spices Board prices →</a>
    </div>`;
}

}

function showAddIncome() {
  const secOpts = db.sections.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  modal(`
    <div class="form-group"><label class="form-label">Date</label><input id="f-id" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
    <div class="form-group"><label class="form-label">Quantity sold (kg)</label><input id="f-iq" type="number" placeholder="100"/></div>
    <div class="form-group"><label class="form-label">Price per kg (₹)</label><input id="f-ip" type="number" placeholder="${db.marketPrice||2450}"/></div>
    <div class="form-group"><label class="form-label">Buyer / market</label><input id="f-ib" type="text" placeholder="Vandanmedu auction"/></div>
    <div class="form-group"><label class="form-label">Section (optional)</label><select id="f-is"><option value="">All sections</option>${secOpts}</select></div>
    <div class="form-group"><label class="form-label">Notes</label><input id="f-ino" type="text" placeholder="Grade, season, etc."/></div>
    <div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveIncome()">Save</button></div>
  `, 'Add income / sale');
}
function saveIncome() {
  const qty = parseFloat(document.getElementById('f-iq').value);
  const pricePerKg = parseFloat(document.getElementById('f-ip').value);
  if (!qty || !pricePerKg) return;
  db.incomes.push({ id:uid(), date:document.getElementById('f-id').value, qty, pricePerKg, buyer:document.getElementById('f-ib').value.trim(), sectionId:document.getElementById('f-is').value||null, notes:document.getElementById('f-ino').value.trim(), createdAt:Date.now() });
  saveLocal(); closeModal(); render();
}

function showUpdatePrice() {
  modal(`
    <div class="form-group"><label class="form-label">Current market price (₹/kg)</label><input id="f-mp" type="number" placeholder="2450" value="${db.marketPrice||''}"/></div>
    <div class="form-group"><label class="form-label">Source / date</label><input id="f-mpd" type="text" placeholder="Vandanmedu, 13 Mar 2025"/></div>
    <p style="font-size:11px;color:var(--text3);margin-top:4px">Check latest prices at <strong>indianspices.com</strong> or call Vandanmedu auction.</p>
    <div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="savePrice()">Update</button></div>
  `, 'Update market price');
}
function savePrice() {
  const v = parseFloat(document.getElementById('f-mp').value);
  if (!v) return;
  db.marketPrice = v;
  db.marketPriceDate = document.getElementById('f-mpd').value || new Date().toLocaleDateString('en-IN');
  saveLocal(); closeModal(); render();
}

// ─── ROUTER ──────────────────────────────────────────────────────────────────
function setTab(tab) {
  appState.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  render();
}
function render() {
  const el = document.getElementById('main-content');
  if (!el) return;
  const renderers = { dashboard:renderDashboard, sections:renderSections, yield:renderYield, expenses:renderExpenses, income:renderIncome, forecast:renderForecast };
  el.innerHTML = (renderers[appState.tab] || renderDashboard)();
}

render();
</script>
