<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#2E7D32"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="V-Plantations"/>
<title>V-Plantations</title>
<style>
/* ── LIGHT THEME ── */
:root{
  --gd:#1B5E20;--gm:#2E7D32;--gl:#43A047;--glight:#66BB6A;
  --gbg:#E8F5E9;--gbr:#A5D6A7;
  --ad:#E65100;--abg:#FFF3E0;--abr:#FFCC80;
  --rd:#C62828;--rbg:#FFEBEE;--rbr:#EF9A9A;
  --bd:#1565C0;--bbg:#E3F2FD;--bbr:#90CAF9;
  --pd:#6A1B9A;--pbg:#F3E5F5;--pbr:#CE93D8;
  --bg:#F1F8F1;--sur:#FFFFFF;--sur2:#F5FAF5;--sur3:#EDF7ED;
  --bor:rgba(0,0,0,0.08);--bor2:rgba(0,0,0,0.15);
  --tx:#1A2E1A;--tx2:#4A5E4A;--tx3:#7A8E7A;
  --shadow:0 2px 12px rgba(46,125,50,0.08);
  --shadow2:0 4px 20px rgba(46,125,50,0.12);
  --r:14px;--rs:10px;
  --hdr-bg:#FFFFFF;
  --nav-bg:#FFFFFF;
  --card-bg:#FFFFFF;
}
/* ── DARK THEME ── */
@media(prefers-color-scheme:dark){:root{
  --gd:#81C784;--gm:#66BB6A;--gl:#4CAF50;--glight:#A5D6A7;
  --gbg:#1B3A1C;--gbr:#2E5E30;
  --ad:#FFB74D;--abg:#2A1800;--abr:#5A3800;
  --rd:#EF9A9A;--rbg:#2A0A0A;--rbr:#5A1A1A;
  --bd:#90CAF9;--bbg:#0A1828;--bbr:#1A3858;
  --pd:#CE93D8;--pbg:#1E0A28;--pbr:#3E1A58;
  --bg:#0F1A0F;--sur:#162016;--sur2:#1C2A1C;--sur3:#1A2E1A;
  --bor:rgba(255,255,255,0.08);--bor2:rgba(255,255,255,0.16);
  --tx:#D4EDD4;--tx2:#9AB89A;--tx3:#5A7A5A;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
  --shadow2:0 4px 20px rgba(0,0,0,0.5);
  --hdr-bg:#162016;
  --nav-bg:#162016;
  --card-bg:#1C2A1C;
}}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;max-width:520px;margin:0 auto;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--hdr-bg);border-bottom:1px solid var(--bor);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gm),var(--gl));border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:18px;height:18px;stroke:#fff;fill:none}
.hdr h1{font-size:17px;font-weight:700;color:var(--tx);letter-spacing:-0.3px}
.hdr p{font-size:11px;color:var(--tx3);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-btn{display:flex;align-items:center;gap:5px;background:var(--gbg);border:1.5px solid var(--gbr);border-radius:20px;padding:6px 11px;font-size:11px;font-weight:600;color:var(--gm);cursor:pointer;white-space:nowrap;transition:all 0.2s}
.sync-btn svg{width:13px;height:13px;flex-shrink:0}
.sync-btn.syncing svg{animation:spin 1s linear infinite}
.sync-btn.err{background:var(--rbg);border-color:var(--rbr);color:var(--rd)}
.sync-btn.ok{background:var(--gbg);border-color:var(--gbr);color:var(--gm)}
@keyframes spin{to{transform:rotate(360deg)}}
.online-dot{width:7px;height:7px;border-radius:50%;background:#9E9E9E;flex-shrink:0;transition:background 0.3s}
.online-dot.on{background:var(--gl)}

/* NAV */
.nav{display:flex;border-top:1px solid var(--bor);background:var(--nav-bg);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:20;box-shadow:0 -2px 12px rgba(0,0,0,0.06)}
.nb{flex:1;padding:8px 2px 10px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--tx3);font-size:10px;font-family:inherit;transition:color 0.15s}
.nb.active{color:var(--gm)}
.nb svg{width:21px;height:21px}
.nb-dot{width:4px;height:4px;border-radius:50%;background:var(--gm);margin-top:-2px;opacity:0}
.nb.active .nb-dot{opacity:1}

/* CONTENT */
.content{flex:1;padding:14px;padding-bottom:84px}

/* CARDS */
.card{background:var(--card-bg);border-radius:var(--r);border:1px solid var(--bor);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.ct{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.ct-action{font-size:11px;font-weight:600;color:var(--gm);cursor:pointer;text-transform:none;letter-spacing:0}

/* METRICS */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.met{background:var(--sur2);border-radius:var(--rs);padding:12px;border:1px solid var(--bor)}
.ml{font-size:11px;color:var(--tx3);margin-bottom:4px;font-weight:500}
.mv{font-size:21px;font-weight:700;line-height:1;color:var(--tx)}
.ms{font-size:10px;color:var(--tx3);margin-top:3px}
.met.g{background:var(--gbg);border-color:var(--gbr)}.met.g .mv{color:var(--gm)}
.met.r{background:var(--rbg);border-color:var(--rbr)}.met.r .mv{color:var(--rd)}
.met.a{background:var(--abg);border-color:var(--abr)}.met.a .mv{color:var(--ad)}
.met.b{background:var(--bbg);border-color:var(--bbr)}.met.b .mv{color:var(--bd)}
.met.p{background:var(--pbg);border-color:var(--pbr)}.met.p .mv{color:var(--pd)}

/* ROWS */
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bor)}
.row:last-of-type{border-bottom:none}
.rt{font-size:13px;font-weight:600;color:var(--tx)}
.rs{font-size:11px;color:var(--tx3);margin-top:2px}
.racts{display:flex;gap:5px;margin-left:8px;flex-shrink:0}
.ia{background:none;border:1px solid var(--bor2);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--tx2);font-weight:500;transition:all 0.15s}
.ia.e{color:var(--bd);border-color:var(--bbr);background:var(--bbg)}
.ia.d{color:var(--rd);border-color:var(--rbr);background:var(--rbg)}
.ia:active{opacity:0.7}

/* BADGES */
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;display:inline-block}
.bl{background:var(--gbg);color:var(--gm)}
.bp{background:var(--rbg);color:var(--rd)}
.br2{background:var(--abg);color:var(--ad)}
.bc2{background:var(--bbg);color:var(--bd)}
.bpu{background:var(--pbg);color:var(--pd)}
.bo{background:var(--sur2);color:var(--tx2)}

/* ADD BUTTON */
.add-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;background:var(--gbg);border:1.5px dashed var(--gbr);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;color:var(--gm);font-family:inherit;margin-top:12px;transition:all 0.15s}
.add-btn:active{background:var(--sur3)}

/* BAR CHARTS */
.br-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.br-lbl{font-size:11px;color:var(--tx3);width:66px;flex-shrink:0;font-weight:500}
.br-trk{flex:1;height:8px;background:var(--sur2);border-radius:4px;overflow:hidden;border:1px solid var(--bor)}
.br-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gm),var(--gl))}
.br-val{font-size:11px;color:var(--tx2);width:55px;text-align:right;flex-shrink:0;font-weight:600}

/* PRICE BANNER */
.pbanner{background:linear-gradient(135deg,var(--gbg),var(--sur3));border:1.5px solid var(--gbr);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.pbanner-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.price-block{position:relative}
.price-type{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:3px}
.price-val{font-size:26px;font-weight:800;color:var(--gm);line-height:1;letter-spacing:-0.5px}
.price-unit{font-size:12px;color:var(--tx3);margin-top:2px}
.price-fetched{font-size:10px;color:var(--gl);margin-top:2px;display:flex;align-items:center;gap:4px}
.price-divider{width:1px;background:var(--gbr);align-self:stretch}
.pbanner-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--gbr)}
.fetch-btn{display:flex;align-items:center;gap:5px;background:var(--gm);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.fetch-btn svg{width:12px;height:12px}
.fetch-btn.fetching svg{animation:spin 1s linear infinite}
.manual-btn{font-size:11px;color:var(--tx3);background:none;border:1px solid var(--bor2);border-radius:8px;padding:7px 10px;cursor:pointer;font-family:inherit}

/* TABS */
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 13px;border:1.5px solid var(--bor);border-radius:20px;background:none;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx3);font-family:inherit;white-space:nowrap;transition:all 0.15s}
.tab.active{background:var(--gbg);border-color:var(--gbr);color:var(--gm);font-weight:700}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 16px;color:var(--tx3);font-size:13px}
.empty svg{width:40px;height:40px;stroke:var(--tx3);margin-bottom:8px;opacity:0.4}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.md{background:var(--sur);border-radius:22px 22px 0 0;padding:20px 16px 40px;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.2)}
.mh{width:40px;height:5px;background:var(--bor2);border-radius:3px;margin:0 auto 18px}
.mt{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--tx)}
.fg{margin-bottom:14px}
.fl{font-size:12px;color:var(--tx2);margin-bottom:5px;display:block;font-weight:600}
input[type=text],input[type=number],input[type=date],input[type=month],input[type=password],select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--bor2);border-radius:var(--rs);font-size:14px;background:var(--sur);color:var(--tx);font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color 0.15s}
input:focus,select:focus{outline:none;border-color:var(--gm);box-shadow:0 0 0 3px rgba(46,125,50,0.1)}
.btn-row{display:flex;gap:8px;margin-top:18px}
.btnp{flex:1;padding:13px;background:linear-gradient(135deg,var(--gm),var(--gl));color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(46,125,50,0.3)}
.btnp:active{opacity:0.85}
.btnc{padding:13px 18px;background:none;border:1.5px solid var(--bor2);border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:inherit;color:var(--tx2)}
.btnd{padding:13px 18px;background:var(--rbg);border:1.5px solid var(--rbr);border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:inherit;color:var(--rd);font-weight:600}

/* INFO BOX */
.sbox{background:var(--abg);border:1.5px solid var(--abr);border-radius:var(--r);padding:14px;margin-bottom:12px}
.sbox h3{font-size:13px;font-weight:700;color:var(--ad);margin-bottom:8px}
.sbox p,.sbox li{font-size:12px;color:var(--ad);line-height:1.6;margin-bottom:4px}
.sbox ol{padding-left:16px;margin-bottom:6px}
.cbox{background:var(--rbg);border:1.5px solid var(--rbr);border-radius:var(--rs);padding:14px;margin-bottom:14px}
.cbox p{font-size:13px;color:var(--rd);line-height:1.5;font-weight:500}

/* MISC */
.pk{font-size:10px;background:var(--gbg);color:var(--gm);padding:2px 7px;border-radius:8px;margin-left:4px;font-weight:700;border:1px solid var(--gbr)}
.slog{font-size:11px;color:var(--tx3);margin-top:8px;font-style:italic;text-align:center}
.section-chip{display:inline-flex;align-items:center;background:var(--sur2);border:1px solid var(--bor);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--tx2);gap:3px}
.price-source{font-size:10px;color:var(--tx3);margin-top:4px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">
      <svg viewBox="0 0 20 20" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3c0 0-5 3-5 8s5 6 5 6 5-1 5-6-5-8-5-8z"/><path d="M10 3v14M7 7l3 2M13 7l-3 2"/></svg>
    </div>
    <div>
      <h1>V-Plantations</h1>
      <p>Cardamom Estate · Idukki</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="online-dot" id="online-dot" title="Network status"></div>
    <button class="sync-btn" id="sync-btn" onclick="triggerSync(true)">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 10a6 6 0 0110.5-4M16 10a6 6 0 01-10.5 4"/><path d="M14 6l.5-2.5 2.5.5M6 14l-.5 2.5-2.5-.5"/></svg>
      <span id="sync-label">Sync</span>
    </button>
  </div>
</div>
<div class="content" id="main-content"></div>
<div class="nav">
  <button class="nb active" id="nav-dashboard" onclick="setTab('dashboard')">
    <svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
    Dashboard<div class="nb-dot"></div>
  </button>
  <button class="nb" id="nav-sections" onclick="setTab('sections')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h14M3 10h10M3 15h7"/></svg>
    Sections<div class="nb-dot"></div>
  </button>
  <button class="nb" id="nav-yield" onclick="setTab('yield')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15l4-5 3 2.5 4-6 3 3"/></svg>
    Yield<div class="nb-dot"></div>
  </button>
  <button class="nb" id="nav-expenses" onclick="setTab('expenses')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M7 9h6M7 12.5h4"/></svg>
    Expenses<div class="nb-dot"></div>
  </button>
  <button class="nb" id="nav-income" onclick="setTab('income')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><path d="M10 6.5v3.5l2.5 1.5"/></svg>
    Income<div class="nb-dot"></div>
  </button>
  <button class="nb" id="nav-forecast" onclick="setTab('forecast')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15l4-5.5 3 2 4-6 3 2.5M15 6h2v2"/></svg>
    Forecast<div class="nb-dot"></div>
  </button>
</div>
<div id="modal-root"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const DB_KEY='vp_data_v1', CFG_KEY='vp_config_v1';
const DRIVE_FILE='vplantations_data.enc', SCOPES='https://www.googleapis.com/auth/drive.appdata';
const CID_PH='YOUR_GOOGLE_CLIENT_ID_HERE';
const AUTO_SYNC_INTERVAL=5*60*1000; // 5 minutes

// ── STATE ─────────────────────────────────────────────────────────────────────
let cfg={driveFileId:null,passphrase:null,lastSyncTs:null,clientId:null,deviceId:'dev_'+Math.random().toString(36).slice(2,8)};
let db={sections:[],seasons:[],yields:[],expenses:[],incomes:[],
  priceRaw:null,priceDried:null,priceDate:null,priceSource:null,updatedAt:Date.now()};
let S={tab:'dashboard',expTab:'all',syncing:false,fetchingPrice:false,oauthToken:null,pendingSync:false};

// ── PERSIST ───────────────────────────────────────────────────────────────────
function saveLocal(){
  db.updatedAt=Date.now();
  try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}
}
function loadLocal(){
  try{
    const d=localStorage.getItem(DB_KEY);
    if(d){const p=JSON.parse(d);
      // migrate old schema: marketPrice → priceDried
      if(p.marketPrice&&!p.priceDried){p.priceDried=p.marketPrice;p.priceDate=p.marketPriceDate||null;delete p.marketPrice;delete p.marketPriceDate;}
      db={...db,...p};
    }
    const c=localStorage.getItem(CFG_KEY);
    if(c)cfg={...cfg,...JSON.parse(c)};
    // migrate old config key
    const oldCfg=localStorage.getItem('cf_config_v2');
    if(oldCfg&&!cfg.passphrase){const o=JSON.parse(oldCfg);cfg={...cfg,...o};saveCfg();}
    // migrate old db key
    const oldDb=localStorage.getItem('cf_data_v3');
    if(oldDb&&!db.sections.length){
      const o=JSON.parse(oldDb);
      db={...db,sections:o.sections||[],seasons:o.seasons||[],yields:o.yields||[],expenses:o.expenses||[],incomes:o.incomes||[],priceDried:o.marketPrice||null,priceDate:o.marketPriceDate||null};
      saveLocal();
    }
  }catch(e){}
}
function saveCfg(){try{localStorage.setItem(CFG_KEY,JSON.stringify(cfg));}catch(e){}}
loadLocal();

// ── CRYPTO ────────────────────────────────────────────────────────────────────
async function getKey(pp,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pp),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encrypt(data,pp){
  const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await getKey(pp,salt);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data)));
  const buf=new Uint8Array(28+ct.byteLength);buf.set(salt);buf.set(iv,16);buf.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...buf));
}
async function decrypt(b64,pp){
  const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0)),key=await getKey(pp,raw.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(16,28)},key,raw.slice(28));
  return JSON.parse(new TextDecoder().decode(pt));
}

// ── GOOGLE DRIVE ──────────────────────────────────────────────────────────────
function getClientId(){return cfg.clientId||CID_PH;}
async function getOAuthToken(){
  if(S.oauthToken)return S.oauthToken;
  return new Promise((res,rej)=>{
    if(typeof google==='undefined'||!google.accounts){rej(new Error('Google API not loaded'));return;}
    google.accounts.oauth2.initTokenClient({client_id:getClientId(),scope:SCOPES,callback:(r)=>{if(r.error)rej(new Error(r.error));else{S.oauthToken=r.access_token;res(r.access_token);}}}).requestAccessToken();
  });
}
async function driveFetch(path,opts={}){
  const tok=await getOAuthToken();
  return fetch('https://www.googleapis.com/'+path,{...opts,headers:{Authorization:'Bearer '+tok,...(opts.headers||{})}});
}
async function findFile(){const r=await driveFetch(`drive/v3/files?spaces=appDataFolder&q=name%3D'${DRIVE_FILE}'&fields=files(id)`);const d=await r.json();return d.files?.[0]||null;}
async function readFile(id){return(await driveFetch(`drive/v3/files/${id}?alt=media`)).text();}
async function writeFile(id,content){
  const meta={name:DRIVE_FILE,parents:id?undefined:['appDataFolder']};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',new Blob([content],{type:'text/plain'}));
  return(await driveFetch(id?`upload/drive/v3/files/${id}?uploadType=multipart`:`upload/drive/v3/files?uploadType=multipart`,{method:id?'PATCH':'POST',body:form})).json();
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
async function triggerSync(manual=false){
  if(S.syncing)return;
  if(!navigator.onLine){if(manual){setSyncUI('err','Offline');setTimeout(()=>setSyncUI('idle','Sync'),2000);}S.pendingSync=true;return;}
  if(!cfg.passphrase){if(manual)showPassphraseSetup();return;}
  if(!getClientId()||getClientId()===CID_PH){if(manual)showClientIdSetup();return;}
  S.syncing=true;S.pendingSync=false;setSyncUI('syncing','Syncing…');
  try{
    await getOAuthToken();
    const file=await findFile();
    if(!file){
      const enc=await encrypt(db,cfg.passphrase);
      const res=await writeFile(null,enc);
      cfg.driveFileId=res.id;cfg.lastSyncTs=Date.now();saveCfg();saveLocal();
      setSyncUI('ok','Synced ✓');
    } else {
      const raw=await readFile(file.id);
      let cloud;
      try{cloud=await decrypt(raw,cfg.passphrase);}
      catch(e){setSyncUI('err','Wrong passphrase');S.syncing=false;return;}
      db=mergeDb(db,cloud);saveLocal();
      const enc=await encrypt(db,cfg.passphrase);
      await writeFile(file.id,enc);
      cfg.lastSyncTs=Date.now();saveCfg();
      setSyncUI('ok','Synced ✓');
      render();
    }
  }catch(e){console.error(e);setSyncUI('err','Failed — retry');}
  S.syncing=false;
  setTimeout(()=>setSyncUI('idle','Sync'),3000);
}

function mergeDb(local,cloud){
  // Use deletedIds to properly sync deletions
  const delIds=new Set([...(local.deletedIds||[]),...(cloud.deletedIds||[])]);
  function ml(a,b){
    const m={};
    for(const x of [...(a||[]),...(b||[])])
      if(!m[x.id]||(x.updatedAt||x.createdAt||0)>(m[x.id].updatedAt||m[x.id].createdAt||0))m[x.id]=x;
    // remove deleted items
    for(const id of delIds)delete m[id];
    return Object.values(m).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  }
  const newer=cloud.updatedAt>local.updatedAt;
  return{
    sections:ml(local.sections,cloud.sections),
    seasons:ml(local.seasons||[],cloud.seasons||[]),
    yields:ml(local.yields,cloud.yields),
    expenses:ml(local.expenses,cloud.expenses),
    incomes:ml(local.incomes,cloud.incomes),
    priceRaw:newer?cloud.priceRaw:local.priceRaw,
    priceDried:newer?cloud.priceDried:local.priceDried,
    priceDate:newer?cloud.priceDate:local.priceDate,
    priceSource:newer?cloud.priceSource:local.priceSource,
    deletedIds:[...delIds],
    updatedAt:Math.max(local.updatedAt||0,cloud.updatedAt||0)
  };
}

function setSyncUI(state,label){
  const btn=document.getElementById('sync-btn'),lbl=document.getElementById('sync-label');
  if(!btn)return;
  btn.className='sync-btn'+(state==='syncing'?' syncing':state==='err'?' err':state==='ok'?' ok':'');
  lbl.textContent=label;
}

// ── PRICE FETCHING ────────────────────────────────────────────────────────────
// Note: Direct price scraping is blocked by CORS. We use a proxy approach via
// allorigins.win to fetch Spices Board data, or fall back to manual entry.
async function fetchLivePrice(){
  if(S.fetchingPrice)return;
  S.fetchingPrice=true;
  const btn=document.getElementById('fetch-btn');
  if(btn){btn.classList.add('fetching');btn.querySelector('span').textContent='Fetching…';}
  try{
    // Try Spices Board price page via allorigins proxy
    const url='https://api.allorigins.win/get?url='+encodeURIComponent('https://www.indianspices.com/marketing/price/domestic/daily-price.html');
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    const json=await r.json();
    const html=json.contents||'';
    // Parse cardamom prices from page
    // The page lists "Small Cardamom" with raw/dried prices
    let raw=null,dried=null,dateStr=null;
    // Look for price patterns near "Cardamom"
    const lines=html.replace(/<[^>]+>/g,' ').split('\n').map(l=>l.trim()).filter(Boolean);
    for(let i=0;i<lines.length;i++){
      if(/cardamom/i.test(lines[i])){
        // Look for numbers in surrounding lines
        for(let j=i;j<Math.min(i+10,lines.length);j++){
          const nums=lines[j].match(/\d{3,5}/g);
          if(nums&&nums.length>=2&&!raw){
            const v1=parseInt(nums[0]),v2=parseInt(nums[1]);
            if(v1>500&&v1<20000)raw=v1;
            if(v2>500&&v2<20000)dried=v2;
          }
        }
        break;
      }
    }
    // Try to find date
    const dateMatch=html.match(/(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/);
    if(dateMatch)dateStr=dateMatch[1];
    if(raw||dried){
      if(raw)db.priceRaw=raw;
      if(dried)db.priceDried=dried;
      db.priceDate=dateStr||new Date().toLocaleDateString('en-IN');
      db.priceSource='Spices Board (auto)';
      saveLocal();triggerSync(false);render();
      showToast('Prices updated from Spices Board');
    } else {
      showToast('Could not parse prices — please update manually');
    }
  }catch(e){
    console.warn('Price fetch failed:',e);
    showToast('Auto-fetch failed — please update manually');
  }
  S.fetchingPrice=false;
  const btn2=document.getElementById('fetch-btn');
  if(btn2){btn2.classList.remove('fetching');btn2.querySelector('span').textContent='Fetch prices';}
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bor2);color:var(--tx);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:200;box-shadow:var(--shadow2);max-width:300px;text-align:center;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._to);t._to=setTimeout(()=>t.style.opacity='0',3000);
}

// ── DELETE WITH TRACKING ──────────────────────────────────────────────────────
function deleteItem(type,id){
  const map={section:'sections',season:'seasons',yield:'yields',expense:'expenses',income:'incomes'};
  const key=map[type];if(!key)return;
  db[key]=db[key].filter(x=>x.id!==id);
  if(!db.deletedIds)db.deletedIds=[];
  if(!db.deletedIds.includes(id))db.deletedIds.push(id);
  saveLocal();
  // Auto-sync after delete
  setTimeout(()=>triggerSync(false),500);
}

        <button class="ia e" onclick="showEditIncome('${i.id}')">Edit</button>
        <button class="ia d" onclick="confirmDel('income','${i.id}','sale ${fd(i.date)}')">Del</button>
      </div>
    </div>
  </div>`).join('')}
  <button class="add-btn" onclick="showEditIncome(null)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 2v10M2 7h10"/></svg>Add sale / income</button>
</div>`;
}

// ── FORECAST ──────────────────────────────────────────────────────────────────
function renderForecast(){
  const mp=db.priceDried||db.priceRaw||2450,plants=totalPlants(),ypp=plants>0?totalYield()/plants:0.45,mexp=db.expenses.length>0?totalExp()/12:3000;
  const now=new Date();
  const rows=Array.from({length:8},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()+i+1,1),mo=d.getMonth()+1,isPeak=[7,8,9,10].includes(mo);
    const pY=Math.round(plants*(ypp||0.45)*(isPeak?1.5:0.55)/12),pI=pY*mp,pE=Math.round(mexp*(isPeak?1.3:0.8));
    return{label:d.toLocaleDateString('en-IN',{month:'short',year:'numeric'}),pY,pI,pE,pP:pI-pE,isPeak};
  });
  return`
<div class="card">
  <div class="ct">Forecast basis</div>
  <div class="mg">
    <div class="met b"><div class="ml">Plants</div><div class="mv">${plants}</div></div>
    <div class="met g"><div class="ml">Dried price used</div><div class="mv" style="font-size:15px">₹${mp}/kg</div></div>
    <div class="met"><div class="ml">Yield/plant/yr</div><div class="mv">${(ypp||0.45).toFixed(2)} kg</div></div>
    <div class="met a"><div class="ml">Peak months</div><div class="mv" style="font-size:13px">Jul–Oct</div></div>
  </div>
</div>
<div class="card">
  <div class="ct">8-month forecast</div>
  ${rows.map(r=>`
  <div class="row">
    <div>
      <div class="rt">${r.label}${r.isPeak?'<span class="pk">Peak</span>':''}</div>
      <div class="rs">~${r.pY}kg · exp ${fc(r.pE)}</div>
    </div>
    <div style="font-size:15px;font-weight:700;color:${r.pP>=0?'var(--gm)':'var(--rd)'};margin-left:8px">${fc(r.pP)}</div>
  </div>`).join('')}
</div>
<div class="card">
  <div class="ct">Market references</div>
  <div class="row"><div><div class="rt">Vandanmedu — MAS Enterprises</div><div class="rs">~25km · Fridays</div></div></div>
  <div class="row"><div><div class="rt">Kumily auction center</div><div class="rs">~30km · Daily</div></div></div>
  <a href="https://www.indianspices.com/marketing/price/domestic/daily-price.html" target="_blank" style="display:flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;color:var(--gm);text-decoration:none;font-weight:600">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5.5"/><path d="M7 4.5v3l2 1" stroke-linecap="round"/></svg>
    Spices Board daily prices
  </a>
</div>`;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function modal(body,title){
  document.getElementById('modal-root').innerHTML=`
    <div class="mo" onclick="if(event.target===this)closeModal()">
      <div class="md">
        <div class="mh"></div>
        ${title?`<div class="mt">${title}</div>`:''}
        ${body}
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function confirmDel(type,id,label){
  modal(`<div class="cbox"><p>Delete <strong>${label}</strong>?<br>This cannot be undone.</p></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnd" onclick="doDel('${type}','${id}')">Delete</button></div>`,'Confirm delete');
}
function doDel(type,id){deleteItem(type,id);closeModal();render();}

// SECTION
function showEditSection(id){
  const s=id?db.sections.find(x=>x.id===id):null;
  modal(`
<div class="fg"><label class="fl">Section name</label><input id="f-sn" type="text" value="${esc(s?.name||'')}" placeholder="e.g. Block D East"/></div>
<div class="fg"><label class="fl">Number of plants</label><input id="f-sp" type="number" value="${s?.plants||''}" placeholder="100"/></div>
<div class="fg"><label class="fl">Age of plants (years)</label><input id="f-sa" type="number" value="${s?.age||''}" placeholder="2"/></div>
<div class="fg"><label class="fl">Notes</label><input id="f-sno" type="text" value="${esc(s?.notes||'')}" placeholder="Slope, shade, irrigation…"/></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="saveSection('${id||''}')">Save</button></div>`,s?'Edit section':'Add section');
}
function saveSection(id){
  const name=document.getElementById('f-sn').value.trim();if(!name)return;
  const data={name,plants:parseInt(document.getElementById('f-sp').value)||0,age:parseInt(document.getElementById('f-sa').value)||0,notes:document.getElementById('f-sno').value.trim(),updatedAt:Date.now()};
  if(id){const i=db.sections.findIndex(x=>x.id===id);if(i>=0)db.sections[i]={...db.sections[i],...data};}
  else db.sections.push({id:uid(),createdAt:Date.now(),...data});
  saveLocal();closeModal();render();setTimeout(()=>triggerSync(false),500);
}

// SEASON
function showEditSeason(id){
  const s=id?(db.seasons||[]).find(x=>x.id===id):null;
  modal(`
<div class="fg"><label class="fl">Season name</label><input id="f-snn" type="text" value="${esc(s?.name||'')}" placeholder="e.g. Kharif 2025"/></div>
<div class="fg"><label class="fl">Start month</label><input id="f-ss" type="month" value="${s?.start||''}"/></div>
<div class="fg"><label class="fl">End month</label><input id="f-se" type="month" value="${s?.end||''}"/></div>
<div class="fg"><label class="fl">Notes</label><input id="f-snn2" type="text" value="${esc(s?.notes||'')}" placeholder="Any notes…"/></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="saveSeason('${id||''}')">Save</button></div>`,s?'Edit season':'Add season');
}
function saveSeason(id){
  const name=document.getElementById('f-snn').value.trim();if(!name)return;
  const data={name,start:document.getElementById('f-ss').value,end:document.getElementById('f-se').value,notes:document.getElementById('f-snn2').value.trim(),updatedAt:Date.now()};
  if(!db.seasons)db.seasons=[];
  if(id){const i=db.seasons.findIndex(x=>x.id===id);if(i>=0)db.seasons[i]={...db.seasons[i],...data};}
  else db.seasons.push({id:uid(),createdAt:Date.now(),...data});
  saveLocal();closeModal();render();setTimeout(()=>triggerSync(false),500);
}

// YIELD
function showEditYield(id){
  const y=id?db.yields.find(x=>x.id===id):null;
  modal(`
<div class="fg"><label class="fl">Section</label><select id="f-ys">${secOpts('Entire farm')}</select></div>
<div class="fg"><label class="fl">Season</label><select id="f-yse">${seaOpts('No season')}</select></div>
<div class="fg"><label class="fl">Month</label><input id="f-yd" type="month" value="${y?.date||new Date().toISOString().slice(0,7)}"/></div>
<div class="fg"><label class="fl">Yield (kg)</label><input id="f-yq" type="number" value="${y?.qty||''}" placeholder="50"/></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="saveYield('${id||''}')">Save</button></div>`,y?'Edit yield':'Add yield');
  if(y){const s=document.getElementById('f-ys');if(s&&y.sectionId)s.value=y.sectionId;const se=document.getElementById('f-yse');if(se&&y.seasonId)se.value=y.seasonId;}
}
function saveYield(id){
  const qty=parseFloat(document.getElementById('f-yq').value);if(!qty)return;
  const data={sectionId:document.getElementById('f-ys').value||null,seasonId:document.getElementById('f-yse').value||null,date:document.getElementById('f-yd').value,qty,updatedAt:Date.now()};
  if(id){const i=db.yields.findIndex(x=>x.id===id);if(i>=0)db.yields[i]={...db.yields[i],...data};}
  else db.yields.push({id:uid(),createdAt:Date.now(),...data});
  saveLocal();closeModal();render();setTimeout(()=>triggerSync(false),500);
}

// EXPENSE
function showEditExpense(id){
  const e=id?db.expenses.find(x=>x.id===id):null;
  modal(`
<div class="fg"><label class="fl">Category</label>
<select id="f-ec"><option value="labor" ${e?.category==='labor'?'selected':''}>Labor</option><option value="pesticide" ${e?.category==='pesticide'?'selected':''}>Pesticide</option><option value="rawmat" ${e?.category==='rawmat'?'selected':''}>Raw material</option><option value="crop" ${e?.category==='crop'?'selected':''}>Crop</option><option value="other" ${e?.category==='other'?'selected':''}>Other</option></select>
</div>
<div class="fg"><label class="fl">Description</label><input id="f-ed" type="text" value="${esc(e?.desc||'')}" placeholder="e.g. Weeding labor"/></div>
<div class="fg"><label class="fl">Amount (₹)</label><input id="f-ea" type="number" value="${e?.amount||''}" placeholder="5000"/></div>
<div class="fg"><label class="fl">Date</label><input id="f-edt" type="date" value="${e?.date||new Date().toISOString().slice(0,10)}"/></div>
<div class="fg"><label class="fl">Section (optional)</label><select id="f-es">${secOpts()}</select></div>
<div class="fg"><label class="fl">Season (optional)</label><select id="f-ese">${seaOpts()}</select></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="saveExpense('${id||''}')">Save</button></div>`,e?'Edit expense':'Add expense');
  if(e){const s=document.getElementById('f-es');if(s&&e.sectionId)s.value=e.sectionId;const se=document.getElementById('f-ese');if(se&&e.seasonId)se.value=e.seasonId;}
}
function saveExpense(id){
  const amount=parseFloat(document.getElementById('f-ea').value),desc=document.getElementById('f-ed').value.trim();if(!amount||!desc)return;
  const data={category:document.getElementById('f-ec').value,desc,amount,date:document.getElementById('f-edt').value,sectionId:document.getElementById('f-es').value||null,seasonId:document.getElementById('f-ese').value||null,updatedAt:Date.now()};
  if(id){const i=db.expenses.findIndex(x=>x.id===id);if(i>=0)db.expenses[i]={...db.expenses[i],...data};}
  else db.expenses.push({id:uid(),createdAt:Date.now(),...data});
  saveLocal();closeModal();render();setTimeout(()=>triggerSync(false),500);
}

// INCOME — note: price NOT prefilled
function showEditIncome(id){
  const i=id?db.incomes.find(x=>x.id===id):null;
  modal(`
<div class="fg"><label class="fl">Date</label><input id="f-id" type="date" value="${i?.date||new Date().toISOString().slice(0,10)}"/></div>
<div class="fg"><label class="fl">Quantity sold (kg)</label><input id="f-iq" type="number" value="${i?.qty||''}" placeholder="100"/></div>
<div class="fg"><label class="fl">Price per kg (₹)</label><input id="f-ip" type="number" value="${i?.pricePerKg||''}" placeholder="Enter price"/></div>
<div class="fg"><label class="fl">Type</label>
<select id="f-ity"><option value="dried" ${(i?.type||'dried')==='dried'?'selected':''}>Dried cardamom</option><option value="raw" ${i?.type==='raw'?'selected':''}>Raw / green cardamom</option></select>
</div>
<div class="fg"><label class="fl">Buyer / market</label><input id="f-ib" type="text" value="${esc(i?.buyer||'')}" placeholder="Vandanmedu auction"/></div>
<div class="fg"><label class="fl">Section (optional)</label><select id="f-is">${secOpts()}</select></div>
<div class="fg"><label class="fl">Season (optional)</label><select id="f-ise">${seaOpts()}</select></div>
<div class="fg"><label class="fl">Notes</label><input id="f-ino" type="text" value="${esc(i?.notes||'')}" placeholder="Grade, batch…"/></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="saveIncome('${id||''}')">Save</button></div>`,i?'Edit income':'Add income / sale');
  if(i){const s=document.getElementById('f-is');if(s&&i.sectionId)s.value=i.sectionId;const se=document.getElementById('f-ise');if(se&&i.seasonId)se.value=i.seasonId;}
}
function saveIncome(id){
  const qty=parseFloat(document.getElementById('f-iq').value),pricePerKg=parseFloat(document.getElementById('f-ip').value);if(!qty||!pricePerKg)return;
  const data={date:document.getElementById('f-id').value,qty,pricePerKg,type:document.getElementById('f-ity').value,buyer:document.getElementById('f-ib').value.trim(),sectionId:document.getElementById('f-is').value||null,seasonId:document.getElementById('f-ise').value||null,notes:document.getElementById('f-ino').value.trim(),updatedAt:Date.now()};
  if(id){const i=db.incomes.findIndex(x=>x.id===id);if(i>=0)db.incomes[i]={...db.incomes[i],...data};}
  else db.incomes.push({id:uid(),createdAt:Date.now(),...data});
  saveLocal();closeModal();render();setTimeout(()=>triggerSync(false),500);
}

// MARKET PRICE
function showEditPrice(){
  modal(`
<div class="fg"><label class="fl">Raw / Green cardamom price (₹/kg)</label><input id="f-mr" type="number" value="${db.priceRaw||''}" placeholder="e.g. 1800"/></div>
<div class="fg"><label class="fl">Dried cardamom price (₹/kg)</label><input id="f-md" type="number" value="${db.priceDried||''}" placeholder="e.g. 2500"/></div>
<div class="fg"><label class="fl">Source / date</label><input id="f-ms" type="text" value="${esc(db.priceSource||'')}" placeholder="Vandanmedu auction, 13 Mar"/></div>
<p style="font-size:11px;color:var(--tx3);margin-top:4px">Or use the Fetch button on dashboard to auto-fetch from Spices Board.</p>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="savePrice()">Update</button></div>`,'Update market prices');
}
function savePrice(){
  const r=parseFloat(document.getElementById('f-mr').value),d=parseFloat(document.getElementById('f-md').value);
  if(!r&&!d)return;
  if(r)db.priceRaw=r;if(d)db.priceDried=d;
  db.priceDate=new Date().toLocaleDateString('en-IN');
  db.priceSource=document.getElementById('f-ms').value||'Manual entry';
  saveLocal();closeModal();render();setTimeout(()=>triggerSync(false),500);
}

// SYNC SETUP
function showPassphraseSetup(){
  modal(`
<div class="sbox"><h3>Set encryption passphrase</h3><p>All users must use the same passphrase. Data is encrypted before uploading — Google cannot read it.</p><p><strong>Write it down and share with family.</strong></p></div>
<div class="fg"><label class="fl">Passphrase (min 6 characters)</label><input id="pp-in" type="password" autocomplete="new-password"/></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="savePassphrase()">Save &amp; sync</button></div>`,'Encryption setup');
}
function savePassphrase(){const v=document.getElementById('pp-in').value.trim();if(!v||v.length<6){alert('Passphrase must be at least 6 characters');return;}cfg.passphrase=v;saveCfg();closeModal();triggerSync(true);}

function showClientIdSetup(){
  modal(`
<div class="sbox"><h3>Enter Google OAuth Client ID</h3><ol><li>Go to console.cloud.google.com</li><li>Enable Google Drive API</li><li>Create OAuth 2.0 Client ID (Web app)</li><li>Add your GitHub Pages URL as authorised origin</li><li>Add your Gmail as test user in OAuth consent screen</li><li>Copy and paste Client ID below</li></ol></div>
<div class="fg"><label class="fl">Client ID</label><input id="cid-in" type="text" placeholder="…apps.googleusercontent.com"/></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="saveClientId()">Save &amp; sync</button></div>`,'Google Drive setup');
}
function saveClientId(){const v=document.getElementById('cid-in').value.trim();if(!v||!v.includes('.apps.googleusercontent.com')){alert('Paste a valid Client ID');return;}cfg.clientId=v;saveCfg();closeModal();triggerSync(true);}

// ── ROUTER ────────────────────────────────────────────────────────────────────
function setTab(tab){
  S.tab=tab;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  render();
}
function render(){
  const el=document.getElementById('main-content');if(!el)return;
  const map={dashboard:renderDashboard,sections:renderSections,yield:renderYield,expenses:renderExpenses,income:renderIncome,forecast:renderForecast};
  el.innerHTML=(map[S.tab]||renderDashboard)();
}

render();
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
