<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#3B6D11"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Farm"/>
<title>Thopramkudy Farm</title>
<style>
:root{--gd:#27500A;--gm:#3B6D11;--gl:#639922;--gbg:#EAF3DE;--gbr:#C0DD97;--ad:#854F0B;--abg:#FAEEDA;--abr:#FAC775;--rd:#993C1D;--rbg:#FAECE7;--bd:#185FA5;--bbg:#E6F1FB;--bg:#f5f4f0;--sur:#ffffff;--sur2:#f8f7f4;--bor:rgba(0,0,0,0.1);--bor2:rgba(0,0,0,0.18);--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--r:12px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1c18;--sur:#23261f;--sur2:#2c3027;--bor:rgba(255,255,255,0.1);--bor2:rgba(255,255,255,0.18);--tx:#e8e6de;--tx2:#a8a69e;--tx3:#6e6c66;--gbg:#1a2e0a;--gbr:#2d5010;--abg:#2a1e08;--abr:#5a3a10;--rbg:#2a1008;--bbg:#081828}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;max-width:520px;margin:0 auto;display:flex;flex-direction:column}
.hdr{background:var(--sur);border-bottom:1px solid var(--bor);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hdr h1{font-size:16px;font-weight:600}.hdr p{font-size:11px;color:var(--tx3);margin-top:1px}
.sync-btn{display:flex;align-items:center;gap:5px;background:var(--gbg);border:1px solid var(--gbr);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:500;color:var(--gd);cursor:pointer;white-space:nowrap}
.sync-btn svg{width:13px;height:13px;flex-shrink:0}.sync-btn.syncing svg{animation:spin 1s linear infinite}.sync-btn.err{background:var(--rbg);border-color:#f0997b;color:var(--rd)}
@keyframes spin{to{transform:rotate(360deg)}}
.content{flex:1;padding:12px;padding-bottom:80px}
.nav{display:flex;border-top:1px solid var(--bor);background:var(--sur);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:20}
.nb{flex:1;padding:8px 2px 10px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--tx3);font-size:10px;font-family:inherit}.nb.active{color:var(--gm)}.nb svg{width:20px;height:20px}
.card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bor);padding:14px;margin-bottom:10px}
.ct{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.met{background:var(--sur2);border-radius:var(--rs);padding:10px 12px}.ml{font-size:11px;color:var(--tx3);margin-bottom:3px}.mv{font-size:20px;font-weight:600;line-height:1}.ms{font-size:10px;color:var(--tx3);margin-top:2px}
.met.g .mv{color:var(--gm)}.met.r .mv{color:var(--rd)}.met.a .mv{color:var(--ad)}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bor)}.row:last-of-type{border-bottom:none}
.rt{font-size:13px;font-weight:500}.rs{font-size:11px;color:var(--tx3);margin-top:1px}
.racts{display:flex;gap:4px;margin-left:8px;flex-shrink:0}
.ia{background:none;border:1px solid var(--bor2);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--tx2)}.ia.e{color:var(--bd)}.ia.d{color:var(--rd)}.ia:active{background:var(--sur2)}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block}
.bl{background:var(--gbg);color:var(--gd)}.bp{background:var(--rbg);color:var(--rd)}.br2{background:var(--abg);color:var(--ad)}.bc2{background:var(--bbg);color:var(--bd)}.bo{background:var(--sur2);color:var(--tx2)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;background:none;border:1px dashed var(--bor2);border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--tx2);font-family:inherit;margin-top:10px}.add-btn:active{background:var(--sur2)}
.br-row{display:flex;align-items:center;gap:8px;margin:4px 0}.br-lbl{font-size:11px;color:var(--tx3);width:62px;flex-shrink:0}.br-trk{flex:1;height:7px;background:var(--sur2);border-radius:4px;overflow:hidden}.br-fill{height:100%;border-radius:4px;background:var(--gl)}.br-val{font-size:11px;color:var(--tx2);width:52px;text-align:right;flex-shrink:0}
.pbanner{background:var(--gbg);border:1px solid var(--gbr);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 12px;border:1px solid var(--bor);border-radius:20px;background:none;font-size:12px;cursor:pointer;color:var(--tx2);font-family:inherit;white-space:nowrap}.tab.active{background:var(--gbg);border-color:var(--gbr);color:var(--gd);font-weight:500}
.empty{text-align:center;padding:28px 16px;color:var(--tx3);font-size:13px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.md{background:var(--sur);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:520px;max-height:90dvh;overflow-y:auto}
.mh{width:36px;height:4px;background:var(--bor2);border-radius:2px;margin:0 auto 16px}.mt{font-size:16px;font-weight:600;margin-bottom:16px}
.fg{margin-bottom:13px}.fl{font-size:12px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:500}
input[type=text],input[type=number],input[type=date],input[type=month],input[type=password],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--bor2);border-radius:var(--rs);font-size:14px;background:var(--sur);color:var(--tx);font-family:inherit;appearance:none;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--gm)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btnp{flex:1;padding:12px;background:var(--gm);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}.btnp:active{background:var(--gd)}
.btnc{padding:12px 16px;background:none;border:1px solid var(--bor2);border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:inherit;color:var(--tx)}
.btnd{padding:12px 16px;background:var(--rbg);border:1px solid #f0997b;border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:inherit;color:var(--rd)}
.sbox{background:var(--abg);border:1px solid var(--abr);border-radius:var(--r);padding:14px;margin-bottom:10px}
.sbox h3{font-size:13px;font-weight:600;color:var(--ad);margin-bottom:8px}
.sbox p,.sbox li{font-size:12px;color:var(--ad);line-height:1.6;margin-bottom:4px}
.sbox ol{padding-left:16px;margin-bottom:6px}
.sir{display:flex;gap:6px;margin-top:8px}.sir input{flex:1;font-size:13px}
.sir button{padding:8px 12px;background:var(--gm);color:#fff;border:none;border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:inherit}
.cbox{background:var(--rbg);border:1px solid #f0997b;border-radius:var(--rs);padding:12px;margin-bottom:12px}
.cbox p{font-size:13px;color:var(--rd);line-height:1.5}
.pk{font-size:10px;background:var(--gbg);color:var(--gm);padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:500}
.slog{font-size:11px;color:var(--tx3);margin-top:6px;font-style:italic}
</style>
</head>
<body>
<div class="hdr">
  <div><h1>Thopramkudy Farm</h1><p>Cardamom Estate · Idukki</p></div>
  <button class="sync-btn" id="sync-btn" onclick="triggerSync()">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 10a6 6 0 0110.5-4M16 10a6 6 0 01-10.5 4"/><path d="M14 6l.5-2.5 2.5.5M6 14l-.5 2.5-2.5-.5"/></svg>
    <span id="sync-label">Sync</span>
  </button>
</div>
<div class="content" id="main-content"></div>
<div class="nav">
  <button class="nb active" id="nav-dashboard" onclick="setTab('dashboard')">
    <svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
    Dashboard
  </button>
  <button class="nb" id="nav-sections" onclick="setTab('sections')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h14M3 10h10M3 15h7"/></svg>
    Sections
  </button>
  <button class="nb" id="nav-yield" onclick="setTab('yield')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15l4-5 3 2.5 4-6 3 3"/></svg>
    Yield
  </button>
  <button class="nb" id="nav-expenses" onclick="setTab('expenses')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M7 9h6M7 12.5h4"/></svg>
    Expenses
  </button>
  <button class="nb" id="nav-income" onclick="setTab('income')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><path d="M10 6.5v3.5l2.5 1.5"/></svg>
    Income
  </button>
  <button class="nb" id="nav-forecast" onclick="setTab('forecast')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15l4-5.5 3 2 4-6 3 2.5M15 6h2v2"/></svg>
    Forecast
  </button>
</div>
<div id="modal-root"></div>
<script>
const DB_KEY='cf_data_v3',CFG_KEY='cf_config_v2';
let cfg={driveFileId:null,passphrase:null,lastSyncTs:null,clientId:null,deviceId:'dev_'+Math.random().toString(36).slice(2,8)};
let db={
  sections:[
    {id:'s1',name:'Upper Block A',plants:120,age:3,notes:'Near stream',createdAt:1700000001000},
    {id:'s2',name:'Lower Block B',plants:85,age:5,notes:'Good shade',createdAt:1700000002000},
    {id:'s3',name:'Hillside C',plants:95,age:2,notes:'New plantation',createdAt:1700000003000},
  ],
  seasons:[
    {id:'sea1',name:'Kharif 2024',start:'2024-07',end:'2024-11',notes:'Main season',createdAt:1700000001000},
    {id:'sea2',name:'Rabi 2024-25',start:'2024-12',end:'2025-03',notes:'',createdAt:1700000002000},
  ],
  yields:[
    {id:'y1',sectionId:'s1',seasonId:'sea1',date:'2024-10',qty:42,createdAt:1700000001000},
    {id:'y2',sectionId:'s2',seasonId:'sea1',date:'2024-10',qty:38,createdAt:1700000002000},
    {id:'y3',sectionId:'s3',seasonId:'sea1',date:'2024-10',qty:18,createdAt:1700000003000},
    {id:'y4',sectionId:'s1',seasonId:'sea2',date:'2025-01',qty:15,createdAt:1700000004000},
    {id:'y5',sectionId:'s2',seasonId:'sea2',date:'2025-01',qty:12,createdAt:1700000005000},
  ],
  expenses:[
    {id:'e1',date:'2025-02-10',category:'labor',desc:'Harvesting labor',amount:8500,sectionId:null,seasonId:'sea2',createdAt:1700000001000},
    {id:'e2',date:'2025-02-05',category:'pesticide',desc:'Fungicide spray',amount:2200,sectionId:'s1',seasonId:'sea2',createdAt:1700000002000},
    {id:'e3',date:'2025-01-20',category:'rawmat',desc:'Fertilizer NPK',amount:4800,sectionId:null,seasonId:'sea2',createdAt:1700000003000},
    {id:'e4',date:'2025-01-15',category:'crop',desc:'Seedlings',amount:3500,sectionId:'s3',seasonId:'sea2',createdAt:1700000004000},
    {id:'e5',date:'2024-12-01',category:'labor',desc:'Weeding',amount:5000,sectionId:null,seasonId:'sea2',createdAt:1700000005000},
  ],
  incomes:[
    {id:'i1',date:'2025-02-12',qty:98,pricePerKg:4200,buyer:'Local trader',notes:'Kharif harvest',sectionId:null,seasonId:'sea1',createdAt:1700000001000},
    {id:'i2',date:'2025-01-20',qty:27,pricePerKg:4050,buyer:'Vandanmedu auction',notes:'Rabi',sectionId:null,seasonId:'sea2',createdAt:1700000002000},
  ],
  marketPrice:2450,marketPriceDate:null,updatedAt:Date.now()
};
let S={tab:'dashboard',expTab:'all',syncing:false,oauthToken:null};

function saveLocal(){db.updatedAt=Date.now();try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem(DB_KEY);if(d){const p=JSON.parse(d);db={...db,...p};}const c=localStorage.getItem(CFG_KEY);if(c){cfg={...cfg,...JSON.parse(c)};}}catch(e){}}
function saveCfg(){try{localStorage.setItem(CFG_KEY,JSON.stringify(cfg));}catch(e){}}
loadLocal();

async function getKey(pp,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pp),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encrypt(data,pp){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await getKey(pp,salt),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data))),buf=new Uint8Array(28+ct.byteLength);buf.set(salt);buf.set(iv,16);buf.set(new Uint8Array(ct),28);return btoa(String.fromCharCode(...buf));}
async function decrypt(b64,pp){const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0)),key=await getKey(pp,raw.slice(0,16)),pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(16,28)},key,raw.slice(28));return JSON.parse(new TextDecoder().decode(pt));}

const DRIVE_FILE='cardamom_farm_data.enc',SCOPES='https://www.googleapis.com/auth/drive.appdata',CID_PH='YOUR_GOOGLE_CLIENT_ID_HERE';
function getClientId(){return cfg.clientId||CID_PH;}
async function getOAuthToken(){
  if(S.oauthToken)return S.oauthToken;
  return new Promise((res,rej)=>{
    if(typeof google==='undefined'||!google.accounts){rej(new Error('Google API not loaded'));return;}
    google.accounts.oauth2.initTokenClient({client_id:getClientId(),scope:SCOPES,callback:(r)=>{if(r.error)rej(new Error(r.error));else{S.oauthToken=r.access_token;res(r.access_token);}}}).requestAccessToken();
  });
}
async function driveFetch(path,opts={}){const tok=await getOAuthToken();return fetch('https://www.googleapis.com/'+path,{...opts,headers:{Authorization:'Bearer '+tok,...(opts.headers||{})}});}
async function findFile(){const r=await driveFetch(`drive/v3/files?spaces=appDataFolder&q=name%3D'${DRIVE_FILE}'&fields=files(id)`);const d=await r.json();return d.files?.[0]||null;}
async function readFile(id){return(await driveFetch(`drive/v3/files/${id}?alt=media`)).text();}
async function writeFile(id,content){const meta={name:DRIVE_FILE,parents:id?undefined:['appDataFolder']};const form=new FormData();form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));form.append('file',new Blob([content],{type:'text/plain'}));return(await driveFetch(id?`upload/drive/v3/files/${id}?uploadType=multipart`:`upload/drive/v3/files?uploadType=multipart`,{method:id?'PATCH':'POST',body:form})).json();}

async function triggerSync(){
  if(S.syncing)return;
  if(!cfg.passphrase){showPassphraseSetup();return;}
  if(!getClientId()||getClientId()===CID_PH){showClientIdSetup();return;}
  S.syncing=true;setSyncUI('syncing','Syncing…');
  try{
    await getOAuthToken();
    const file=await findFile();
    if(!file){const enc=await encrypt(db,cfg.passphrase);const res=await writeFile(null,enc);cfg.driveFileId=res.id;cfg.lastSyncTs=Date.now();saveCfg();saveLocal();setSyncUI('ok','Synced ✓');}
    else{const raw=await readFile(file.id);let cloud;try{cloud=await decrypt(raw,cfg.passphrase);}catch(e){setSyncUI('err','Wrong passphrase');S.syncing=false;return;}db=mergeDb(db,cloud);saveLocal();const enc=await encrypt(db,cfg.passphrase);await writeFile(file.id,enc);cfg.lastSyncTs=Date.now();saveCfg();setSyncUI('ok','Synced ✓');render();}
  }catch(e){console.error(e);setSyncUI('err','Failed — retry');}
  S.syncing=false;setTimeout(()=>setSyncUI('idle','Sync'),3000);
}
function mergeDb(local,cloud){
  function ml(a,b){const m={};for(const x of a)m[x.id]=x;for(const x of b)if(!m[x.id]||(x.createdAt||0)>(m[x.id].createdAt||0))m[x.id]=x;return Object.values(m).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));}
  return{sections:ml(local.sections,cloud.sections||[]),seasons:ml(local.seasons||[],cloud.seasons||[]),yields:ml(local.yields,cloud.yields),expenses:ml(local.expenses,cloud.expenses),incomes:ml(local.incomes,cloud.incomes),marketPrice:cloud.updatedAt>local.updatedAt?cloud.marketPrice:local.marketPrice,marketPriceDate:cloud.updatedAt>local.updatedAt?cloud.marketPriceDate:local.marketPriceDate,updatedAt:Math.max(local.updatedAt||0,cloud.updatedAt||0)};
}
function setSyncUI(state,label){const btn=document.getElementById('sync-btn'),lbl=document.getElementById('sync-label');if(!btn)return;btn.className='sync-btn'+(state==='syncing'?' syncing':state==='err'?' err':'');lbl.textContent=label;}

const uid=()=>'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fc=n=>'₹'+Math.round(n).toLocaleString('en-IN');
const fd=s=>{if(!s)return'';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});};
const totalPlants=()=>db.sections.reduce((s,x)=>s+(x.plants||0),0);
const totalYield=()=>db.yields.reduce((s,x)=>s+(x.qty||0),0);
const totalExp=()=>db.expenses.reduce((s,x)=>s+(x.amount||0),0);
const totalInc=()=>db.incomes.reduce((s,x)=>s+((x.qty||0)*(x.pricePerKg||0)),0);
const yieldForSec=id=>db.yields.filter(y=>y.sectionId===id).reduce((s,y)=>s+(y.qty||0),0);
const CL={labor:'Labor',pesticide:'Pesticide',rawmat:'Raw material',crop:'Crop',other:'Other'};
const BC={labor:'bl',pesticide:'bp',rawmat:'br2',crop:'bc2',other:'bo'};
const secName=id=>{const s=db.sections.find(x=>x.id===id);return s?s.name:'All sections';};
const seaName=id=>{if(!id)return'';const s=(db.seasons||[]).find(x=>x.id===id);return s?s.name:'';};
const secOpts=(blank='All sections')=>`<option value="">${blank}</option>`+db.sections.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
const seaOpts=(blank='No season')=>`<option value="">${blank}</option>`+(db.seasons||[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
const esc=s=>(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');

function renderDashboard(){
  const inc=totalInc(),exp=totalExp(),profit=inc-exp,plants=totalPlants(),ykg=totalYield();
  const byCat={};db.expenses.forEach(e=>byCat[e.category]=(byCat[e.category]||0)+e.amount);
  const maxE=Math.max(...Object.values(byCat),1);
  const bClr={labor:'var(--gl)',pesticide:'var(--rd)',rawmat:'var(--ad)',crop:'var(--bd)',other:'var(--tx3)'};
  const recent=[...db.yields.slice(-3).map(y=>({t:'y',y,ts:y.createdAt})),...db.incomes.slice(-2).map(i=>({t:'i',i,ts:i.createdAt}))].sort((a,b)=>b.ts-a.ts).slice(0,5);
  return`${db.marketPrice?`<div class="pbanner"><div><div style="font-size:11px;font-weight:600;color:var(--gm);margin-bottom:2px">Vandanmedu / Kumily auction</div><div style="display:flex;align-items:baseline;gap:4px"><span style="font-size:22px;font-weight:700;color:var(--gd)">₹${db.marketPrice}</span><span style="font-size:12px;color:var(--gm)">/kg</span></div><div style="font-size:11px;color:var(--gm)">${db.marketPriceDate||''}</div></div><button onclick="showEditPrice()" style="background:var(--gm);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:inherit">Update</button></div>`:`<div class="pbanner" style="cursor:pointer" onclick="showEditPrice()"><div style="font-size:13px;font-weight:500;color:var(--gm)">Tap to enter market price</div></div>`}
<div class="card"><div class="ct">Farm overview</div><div class="mg">
<div class="met"><div class="ml">Total plants</div><div class="mv">${plants.toLocaleString('en-IN')}</div><div class="ms">${db.sections.length} sections</div></div>
<div class="met"><div class="ml">Total yield</div><div class="mv">${ykg} kg</div><div class="ms">${db.yields.length} entries</div></div>
<div class="met g"><div class="ml">Total income</div><div class="mv">${fc(inc)}</div><div class="ms">${db.incomes.length} sales</div></div>
<div class="met ${profit>=0?'g':'r'}"><div class="ml">Net profit</div><div class="mv">${fc(profit)}</div><div class="ms">after expenses</div></div>
</div></div>

function modal(body,title){document.getElementById('modal-root').innerHTML=`<div class="mo" onclick="if(event.target===this)closeModal()"><div class="md"><div class="mh"></div>${title?`<div class="mt">${title}</div>`:''}${body}</div></div>`;}

function confirmDel(type,id,label){
  modal(`<div class="cbox"><p>Delete <strong>${label}</strong>?<br>This cannot be undone.</p></div><div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnd" onclick="doDel('${type}','${id}')">Delete</button></div>`,'Confirm delete');

function doDel(type,id){
  const map={section:'sections',season:'seasons',yield:'yields',expense:'expenses',income:'incomes'};

  db[key]=db[key].filter(x=>x.id!==id);
  saveLocal();closeModal();render();
}

function showClientIdSetup(){
  modal(`<div class="sbox"><h3>Enter Google OAuth Client ID</h3><ol><li>Go to console.cloud.google.com</li><li>Enable Google Drive API</li><li>Create OAuth 2.0 Client ID (Web app)</li><li>Add your GitHub Pages URL as authorised origin</li><li>Add your Gmail as test user in OAuth consent screen</li><li>Copy and paste Client ID below</li></ol></div>
<div class="fg"><label class="fl">Client ID</label><input id="cid-in" type="text" placeholder="…apps.googleusercontent.com"/></div>
<div class="btn-row"><button class="btnc" onclick="closeModal()">Cancel</button><button class="btnp" onclick="saveClientId()">Save &amp; sync</button></div>`,'Google Drive setup');
}
function saveClientId(){const v=document.getElementById('cid-in').value.trim();if(!v||!v.includes('.apps.googleusercontent.com')){alert('Paste a valid Client ID');return;}cfg.clientId=v;saveCfg();closeModal();triggerSync();}

function setTab(tab){S.tab=tab;document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));document.getElementById('nav-'+tab)?.classList.add('active');render();}
function render(){const el=document.getElementById('main-content');if(!el)return;const map={dashboard:renderDashboard,sections:renderSections,yield:renderYield,expenses:renderExpenses,income:renderIncome,forecast:renderForecast};el.innerHTML=(map[S.tab]||renderDashboard)();}

render();
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
